<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Life Project">
<meta name="theme-color" content="#f4f2ee">
<title>Life Project</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --app-bg:#fafaf8;--app-sidebar:#f4f2ee;--app-border:#e5e2db;--app-border2:#ccc8bf;
  --app-text:#1c1917;--app-text2:#78716c;--app-text3:#b8b2aa;
  --app-surface:#fafaf8;--app-hover:#edeae4;--app-accent:#1c1917;
  --br:10px;--br2:14px;
  --sidebar-w:220px;
  --fs-base:16px;--fs-sm:14px;--fs-xs:13px;--fs-xxs:12px;
  --touch:48px;
}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  color:var(--app-text);background:var(--app-bg);font-size:var(--fs-base)}

/* ── layout ── */
.app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;height:100dvh;overflow:hidden}
.sidebar{border-right:1px solid var(--app-border);display:flex;flex-direction:column;background:var(--app-sidebar);overflow:hidden}
.sidebar-header{padding:16px 14px 13px;border-bottom:1px solid var(--app-border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
/* ③ sidebar title 20px */
.sidebar-header span{font-size:20px;font-weight:400;color:var(--app-text)}
.btn-add-project{background:transparent!important;border:none!important;outline:none!important;box-shadow:none!important;
  width:var(--touch);height:var(--touch);cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--app-text3);font-size:22px;transition:color .15s;flex-shrink:0;padding:0;margin-right:-8px}
.btn-add-project:active{color:var(--app-text)}

.projects-list{flex:1;overflow-y:auto;padding:8px;-webkit-overflow-scrolling:touch;user-select:none}
.project-item{border-radius:var(--br);margin-bottom:3px;cursor:pointer;transition:background .15s;
  display:flex;align-items:center;min-height:54px;position:relative}
.project-item.active{background:var(--app-surface)}
.project-item:active:not(.active){background:var(--app-hover)}
.project-item.drag-over{background:var(--app-hover);border-top:2px solid var(--app-accent)}
.project-item.dragging{opacity:.3}

/* floating ghost while touch-dragging */
#projGhost{
  position:fixed;pointer-events:none;z-index:9999;
  border-radius:var(--br);background:var(--app-surface);
  box-shadow:0 8px 28px rgba(0,0,0,.22);
  display:flex;align-items:center;gap:10px;
  padding:10px 16px;font-size:20px;color:var(--app-text);
  min-width:160px;opacity:.93;transform:scale(1.04);
  transition:none;
}
.project-header{display:flex;align-items:center;gap:10px;padding:10px 12px 10px 0;flex:1;min-width:0}
.color-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
/* ③ project list item 20px */
.project-name{font-size:20px;font-weight:400;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--app-text)}

/* ② sidebar footer — single 設定 button */
.sidebar-footer{padding:10px 12px 20px;border-top:1px solid var(--app-border);flex-shrink:0}
.btn-settings-main{
  width:100%;background:transparent!important;border:none!important;outline:none!important;
  box-shadow:none!important;cursor:pointer;
  display:flex;align-items:center;gap:7px;padding:12px 4px;
  font-size:var(--fs-base);color:var(--app-text3);font-family:inherit;transition:color .15s;
  min-height:var(--touch)}
.btn-settings-main:active{color:var(--app-text)}
#importInput{display:none}

/* ── main ── */
.main{display:flex;flex-direction:column;overflow:hidden;background:var(--app-bg)}

/* ② top bar 合併漢堡 + tabs（僅手機），桌面不顯示 */
.top-bar{display:none;align-items:center;border-bottom:1px solid var(--app-border);background:var(--app-sidebar);flex-shrink:0;padding:0 4px}
.btn-menu{background:transparent;border:none;color:var(--app-text2);font-size:22px;cursor:pointer;
  padding:0;display:flex;align-items:center;width:var(--touch);height:var(--touch);justify-content:center;flex-shrink:0}

/* ③ tab 樣式：放大字體、底線緊貼文字 */
.main-tabs{display:flex;border-bottom:1px solid var(--app-border);padding:0 12px;background:var(--app-sidebar);gap:0;flex-shrink:0}
.tab{background:transparent!important;border:none!important;outline:none!important;box-shadow:none!important;
  padding:14px 13px 6px;font-size:16px;cursor:pointer;color:var(--app-text3);
  position:relative;font-family:inherit;
  transition:color .2s;font-weight:400;white-space:nowrap}
/* ④ active 底線改淡黃色 */
.tab::after{content:'';position:absolute;bottom:2px;left:10px;right:10px;height:3px;
  background:#f5d76e;border-radius:3px 3px 0 0;
  transform:scaleX(0);transition:transform .25s cubic-bezier(.4,0,.2,1)}
.tab:active{color:var(--app-text2)}
.tab.active{color:var(--app-text);font-weight:600}
.tab.active::after{transform:scaleX(1)}

.main-content{flex:1;overflow:hidden;display:flex;flex-direction:column}
.task-pane{display:none;flex:1;overflow-y:auto;padding:14px 16px;-webkit-overflow-scrolling:touch;flex-direction:column}
.task-pane.active{display:flex}

/* project chip selector */
.proj-chips-row{display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0;margin-bottom:10px}
.proj-chip{
  font-size:var(--fs-sm);padding:5px 13px;border-radius:999px;cursor:pointer;
  border:1.5px solid;font-weight:500;min-height:32px;display:flex;align-items:center;
  transition:background .15s,border-color .15s,opacity .15s,filter .15s;white-space:nowrap;
  font-family:inherit;background:transparent;
}
.proj-chip.active{font-weight:600}
/* ② inactive 大幅淡化，拉開對比 */
.proj-chip:not(.active){color:#9FA0A0!important;border-color:#9FA0A0!important;background:transparent!important;opacity:1;filter:none}

/* ① depth-0 拖曳把手 */

/* 佔位區塊 */
.task-drop-placeholder{
  background:color-mix(in srgb,var(--app-accent) 8%,transparent);
  border:1.5px dashed var(--app-border2);
  border-radius:var(--br);
  margin:2px 0;
  pointer-events:none;
  transition:height .1s;
}

/* ① 底部懸浮列 */
.tasks-bottom-bar{
  position:fixed;bottom:0;left:0;right:0;
  display:none; /* 只在任務分頁啟用，由 JS 切換 */
  align-items:flex-end;justify-content:space-between;
  padding:12px 20px 28px;
  pointer-events:none;
  z-index:40;
}
.tasks-bottom-bar.visible{display:flex}
/* 底部漸層遮罩 */
.tasks-bottom-bar::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to top, var(--app-bg) 40%, transparent 100%);
  z-index:-1;
}
/* 隱藏/顯示已完成 — 左下角 */
.btn-toggle-done-float{
  pointer-events:all;
  background:var(--app-surface)!important;
  border:1px solid var(--app-border2)!important;
  outline:none!important;box-shadow:0 2px 8px rgba(0,0,0,.10);
  cursor:pointer;color:var(--app-text2);font-size:13px;
  display:flex;align-items:center;gap:5px;
  font-family:inherit;padding:8px 14px;border-radius:20px;
  transition:all .15s;white-space:nowrap;
}
.btn-toggle-done-float.active-filter{
  background:var(--app-accent)!important;color:var(--app-bg)!important;
  border-color:var(--app-accent)!important;
}
/* + FAB — 右下角圓形 */
.btn-fab-add{
  pointer-events:all;
  width:54px;height:54px;border-radius:50%;
  background:var(--app-accent);color:var(--app-bg);
  border:none;outline:none;cursor:pointer;
  font-size:28px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(0,0,0,.22);
  transition:opacity .15s,transform .15s;flex-shrink:0;
}
.btn-fab-add:active{opacity:.85;transform:scale(.95)}

/* 底部懸浮列佔位，讓捲動內容不被遮住 */
.tasks-fab-spacer{height:88px;flex-shrink:0}

.toggle-done-btn{background:transparent!important;border:1px solid var(--app-border2)!important;outline:none!important;
  cursor:pointer;color:var(--app-text3);font-size:12px;display:flex;align-items:center;gap:4px;
  font-family:inherit;padding:5px 9px;border-radius:20px;transition:all .15s;white-space:nowrap}
.toggle-done-btn.active-filter{background:var(--app-accent)!important;color:var(--app-bg)!important;border-color:var(--app-accent)!important}

/* ── task tree ── */
.task-tree{display:flex;flex-direction:column;gap:0;flex:1}
.task-row{display:flex;align-items:center;gap:3px;padding:3px 6px;border-radius:var(--br);transition:background .12s;min-height:40px}
.task-row:active{background:var(--app-hover)}
.depth-0>.task-row{padding:4px 8px;min-height:42px}
.depth-1 .task-row,.depth-2 .task-row,.depth-3 .task-row{background:none}

/* ① checkbox：視覺 13×13，觸控用透明 padding 撐至 44×44 */
.task-checkbox{
  width:14px;height:14px;border-radius:3px;border:1.5px solid var(--app-border2);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .15s;background:none;box-sizing:border-box;
  position:relative;
}
/* 透明偽元素撐出 44×44 觸控區，不影響視覺尺寸 */
.task-checkbox::before{
  content:'';position:absolute;
  top:50%;left:50%;transform:translate(-50%,-50%);
  width:44px;height:44px;
}
.task-checkbox.checked{background:#5a9e6f;border-color:#5a9e6f;color:#fff}

/* ② 文字層級：depth 0 & 1 粗體，depth 2+ 一般 */
.task-name-btn{
  flex:1;font-size:var(--task-fs,16px);cursor:pointer;
  background:transparent!important;border:none!important;
  outline:none!important;box-shadow:none!important;
  text-align:left;font-family:inherit;color:var(--app-text);
  padding:8px 4px 8px 6px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.3;
  font-weight:400;
}
.depth-0 > .task-row .task-name-btn,
.depth-1 > .task-row .task-name-btn{font-weight:600}
.depth-2 > .task-row .task-name-btn,
.depth-3 > .task-row .task-name-btn{font-weight:400}
.task-name-btn.done{text-decoration:line-through;color:var(--app-text3)}
.has-note{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--app-accent);margin-left:6px;vertical-align:middle;opacity:.4}
.task-date-label{font-size:14px;color:var(--app-text2);white-space:nowrap;flex-shrink:0;padding:0 2px;opacity:.75}
.task-date-label.no-date{display:none}
.task-add-btn{background:none;border:none;cursor:pointer;color:var(--app-text3);font-size:18px;
  width:44px;height:44px;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:color .12s;margin:-6px -4px -6px 0}
.task-add-btn:active{color:var(--app-text)}
.children{margin-left:14px;padding-left:10px;border-left:1.5px solid var(--app-border);display:flex;flex-direction:column;gap:0;margin-top:0}
.expand-btn{background:none;border:none;cursor:pointer;color:var(--app-text3);font-size:12px;
  width:28px;height:28px;display:flex;align-items:center;justify-content:center;flex-shrink:0;
  padding:8px;margin:-8px -4px -8px -8px;box-sizing:content-box}
.empty-state{text-align:center;padding:60px 20px;color:var(--app-text3);font-size:var(--fs-sm)}
.empty-state i{font-size:36px;margin-bottom:14px;display:block;opacity:.2}
.no-project{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;color:var(--app-text2);gap:12px}
.no-project i{font-size:44px;opacity:.15}
.no-project p{font-size:var(--fs-sm)}

/* ── org-chart tree view ── */
.tree-top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-shrink:0;gap:8px;flex-wrap:wrap}
.tree-chips-row{display:flex;gap:6px;flex-wrap:nowrap;overflow-x:auto;flex:1;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tree-chips-row::-webkit-scrollbar{display:none}
/* 2D scrollable canvas */
.tree-canvas-wrap{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;position:relative;cursor:grab}
.tree-canvas-wrap:active{cursor:grabbing}
.tree-canvas{display:inline-block;min-width:100%;padding:16px 24px 40px;position:relative}
/* nodes */
.oc-node{display:inline-flex;flex-direction:column;align-items:center;position:relative}
.oc-box{border:1.5px solid var(--app-border2);border-radius:10px;padding:8px 14px;
  background:var(--app-surface);font-size:var(--task-fs,15px);font-weight:600;
  color:var(--app-text);white-space:nowrap;cursor:pointer;transition:background .15s;
  box-shadow:0 1px 4px rgba(0,0,0,.06);text-align:center;min-width:72px}
.oc-box:active{background:var(--app-hover)}
.oc-box.root{font-size:calc(var(--task-fs,15px) + 1px);border-width:2px;background:var(--app-hover)}
.oc-box.done{text-decoration:line-through;color:var(--app-text3);opacity:.6}
/* connector lines */
.oc-connector-down{width:2px;height:20px;background:var(--app-border2);flex-shrink:0}
.oc-h-line{height:2px;background:var(--app-border2);position:absolute;top:0}
.oc-children-wrap{display:flex;flex-direction:column;align-items:center}
.oc-children-row{display:flex;flex-direction:row;align-items:flex-start;gap:0;position:relative}
.oc-child-col{display:flex;flex-direction:column;align-items:center;padding:0 12px;position:relative}
/* leaf list under a node */
.oc-leaf-list{margin-top:12px;border-left:2px solid var(--app-border2);padding-left:10px;min-width:100px;align-self:flex-start}
.oc-leaf-item{display:flex;align-items:center;gap:6px;padding:4px 0;min-height:32px;cursor:pointer}
.oc-leaf-cb{width:13px;height:13px;border-radius:3px;border:1.5px solid var(--app-border2);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;background:none;
  transition:all .15s;position:relative;cursor:pointer}
.oc-leaf-cb::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:36px;height:36px}
.oc-leaf-cb.checked{background:#5a9e6f;border-color:#5a9e6f;color:#fff}
.oc-leaf-label{font-size:calc(var(--task-fs,15px) - 1px);color:var(--app-text);line-height:1.3}
.oc-leaf-label.done{text-decoration:line-through;color:var(--app-text3)}

/* ── calendar ── */
.cal-wrapper{display:flex;flex-direction:column;flex:1;overflow:hidden}
/* ① chips 在上，導航在下，兩者緊湊 */
.cal-header{display:flex;flex-direction:column;gap:6px;margin-bottom:6px;flex-shrink:0;padding:0 2px}
/* ② 月份導航置中 */
.cal-nav-row{display:flex;align-items:center;justify-content:center}
.cal-nav{display:flex;align-items:center;gap:8px}
.cal-title{font-size:17px;font-weight:400;color:var(--app-text)}
.cal-filter{display:flex;gap:6px;flex-wrap:wrap}
.filter-chip{font-size:var(--fs-sm);padding:5px 10px;border-radius:999px;cursor:pointer;
  border:1.5px solid transparent;transition:opacity .15s;font-weight:500;min-height:32px;display:flex;align-items:center}
.filter-chip.off{color:#9FA0A0!important;border-color:#9FA0A0!important;background:transparent!important;opacity:1;filter:none}
/* ③ grid 行高 auto — 隨事件多寡自動撐開 */
.cal-grid-wrap{flex:1;display:flex;flex-direction:column;overflow-y:auto;-webkit-overflow-scrolling:touch}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--app-border);
  border:1px solid var(--app-border);border-radius:var(--br);overflow:hidden;
  grid-template-rows:auto;/* rows size to content */}
/* ④ 星期標題列：極窄，僅文字高度 */
.cal-day-header{background:var(--app-sidebar);padding:3px 2px;text-align:center;
  font-size:var(--fs-xxs);font-weight:700;color:var(--app-text2);line-height:1}
/* 日期 cell 不再強制 min-height，讓列高跟隨內容 */
.cal-day{background:var(--app-surface);padding:5px 4px;transition:background .15s;
  overflow:hidden;display:flex;flex-direction:column}
.cal-day.other-month{background:var(--app-hover)}
.cal-day.today .day-num{background:var(--app-accent);color:var(--app-bg);border-radius:50%}
.cal-day.drop-target{background:color-mix(in srgb,var(--app-accent) 8%,var(--app-surface));outline:2px dashed var(--app-accent);outline-offset:-3px}
.day-num{font-size:var(--fs-xxs);font-weight:500;margin-bottom:2px;width:20px;height:20px;
  display:flex;align-items:center;justify-content:center;color:var(--app-text2);flex-shrink:0}
.cal-event{font-size:10px;padding:2px 4px;border-radius:3px;margin-bottom:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;transition:opacity .12s;line-height:1.3}
.cal-event:active{opacity:.7}
.cal-event.done{text-decoration:line-through;opacity:.38}
.btn-cal-nav{background:transparent;border:none;outline:none;
  width:var(--touch);height:var(--touch);font-size:20px;color:var(--app-text2);
  cursor:pointer;display:flex;align-items:center;justify-content:center}

/* ── modal ── */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.32);display:flex;align-items:flex-end;justify-content:center;z-index:100}
@media(min-width:600px){.modal-backdrop{align-items:center}}
/* ① 單日任務置中彈出視窗 */
.modal-day-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.38);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal-day{background:var(--app-surface);border-radius:var(--br2);border:1px solid var(--app-border);
  width:100%;max-width:480px;max-height:75dvh;display:flex;flex-direction:column;
  box-shadow:0 8px 32px rgba(0,0,0,.18)}
.modal-day-header{display:flex;align-items:center;justify-content:space-between;
  padding:18px 20px 14px;border-bottom:1px solid var(--app-border);flex-shrink:0}
.modal-day-body{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 20px 16px;flex:1}
.modal{
  background:var(--app-surface);border-radius:var(--br2) var(--br2) 0 0;
  border:1px solid var(--app-border);
  width:100%;max-width:520px;
  max-height:calc(92dvh - env(safe-area-inset-bottom,0px));
  display:flex;flex-direction:column;
  box-shadow:0 -4px 24px rgba(0,0,0,.1);
  overflow:hidden;
}
/* 捲動區：標題 + 表單 */
.modal-scroll{
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:24px 24px 0;
  flex:1;
}
/* 按鈕列固定在底部，不跟著捲 */
.modal-actions{
  display:flex;gap:8px;justify-content:flex-end;
  padding:14px 24px calc(14px + env(safe-area-inset-bottom,20px));
  flex-shrink:0;
  border-top:1px solid var(--app-border);
  background:var(--app-surface);
}
@media(min-width:600px){
  .modal{border-radius:var(--br2);max-height:90dvh}
  .modal-actions{padding:14px 24px}
}
.modal h3{font-size:var(--fs-base);font-weight:600;margin-bottom:18px;color:var(--app-text)}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:var(--fs-xs);font-weight:500;color:var(--app-text2);margin-bottom:6px;letter-spacing:.03em}
.form-group input,.form-group textarea{width:100%;padding:12px 14px;border:1px solid var(--app-border2);border-radius:var(--br);
  font-size:var(--fs-base);font-family:inherit;background:var(--app-surface);color:var(--app-text);
  outline:none;transition:border-color .15s;resize:vertical;-webkit-appearance:none}
.form-group input:focus,.form-group textarea:focus{border-color:var(--app-accent)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;flex-wrap:wrap}
.btn-primary{background:var(--app-accent);color:var(--app-bg);border:none;border-radius:var(--br);
  padding:12px 22px;font-size:var(--fs-base);cursor:pointer;font-family:inherit;font-weight:500;min-height:var(--touch)}
.btn-primary:active{opacity:.85}
.btn-secondary{background:none;color:var(--app-text2);border:1px solid var(--app-border2);border-radius:var(--br);
  padding:12px 16px;font-size:var(--fs-base);cursor:pointer;font-family:inherit;min-height:var(--touch)}
.btn-secondary:active{background:var(--app-hover)}
.btn-danger{background:none;color:#c0392b;border:1px solid #e0a8a3;border-radius:var(--br);
  padding:12px 16px;font-size:var(--fs-base);cursor:pointer;font-family:inherit;min-height:var(--touch)}
.btn-danger:active{background:#fdf0ef}
.note-path{font-size:var(--fs-xs);color:var(--app-text3);margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--app-border);line-height:1.5}

/* ── 自製日期選擇器 ── */
.dp-wrap{border:1px solid var(--app-border2);border-radius:var(--br);overflow:hidden;margin-top:2px}
.dp-header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--app-hover)}
.dp-month-label{font-size:15px;font-weight:500;color:var(--app-text);flex:1;text-align:center}
.dp-nav{background:none;border:none;color:var(--app-text2);font-size:18px;cursor:pointer;
  width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:6px}
.dp-nav:active{background:var(--app-border)}
.dp-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:4px 6px 8px}
.dp-dow{font-size:11px;font-weight:600;color:var(--app-text3);text-align:center;padding:4px 0}
.dp-cell{font-size:14px;text-align:center;padding:6px 2px;cursor:pointer;border-radius:6px;color:var(--app-text);line-height:1}
.dp-cell:active{background:var(--app-hover)}
.dp-cell.other{color:var(--app-text3);opacity:.4}
.dp-cell.today{font-weight:600;color:var(--app-accent)}
.dp-cell.selected{background:var(--app-accent);color:var(--app-bg);border-radius:50%;font-weight:600}
.dp-cell.selected.today{background:var(--app-accent);color:var(--app-bg)}
.dp-selected-label{font-size:13px;color:var(--app-text2);padding:6px 12px 8px;border-top:1px solid var(--app-border);text-align:center;min-height:32px}
.dp-clear{background:none;border:none;color:var(--app-text3);font-size:13px;cursor:pointer;padding:8px 0 2px;font-family:inherit;display:block}

/* action sheet (long-press menu) */
.action-sheet-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.28);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.action-sheet{background:var(--app-surface);border-radius:var(--br2) var(--br2) 0 0;width:100%;max-width:520px;
  padding:8px 0 24px;box-shadow:0 -4px 24px rgba(0,0,0,.15)}
.action-sheet-title{font-size:var(--fs-xs);color:var(--app-text3);text-align:center;padding:12px 16px 8px;border-bottom:1px solid var(--app-border);margin-bottom:4px}
.action-sheet-btn{display:flex;align-items:center;gap:14px;width:100%;background:none;border:none;
  padding:16px 24px;font-size:var(--fs-base);color:var(--app-text);font-family:inherit;cursor:pointer;text-align:left;min-height:56px}
.action-sheet-btn:active{background:var(--app-hover)}
.action-sheet-btn.danger{color:#c0392b}
.action-sheet-btn i{font-size:20px;flex-shrink:0}
.action-sheet-cancel{display:flex;align-items:center;justify-content:center;width:100%;background:none;border:none;
  padding:16px 24px;font-size:var(--fs-base);color:var(--app-text2);font-family:inherit;cursor:pointer;min-height:56px;
  border-top:1px solid var(--app-border);margin-top:4px}
.action-sheet-cancel:active{background:var(--app-hover)}

/* settings menu */
.settings-menu-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.28);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.settings-menu{background:var(--app-surface);border-radius:var(--br2) var(--br2) 0 0;width:100%;max-width:520px;
  padding:8px 0 24px;box-shadow:0 -4px 24px rgba(0,0,0,.15)}
.settings-menu-title{font-size:var(--fs-xs);color:var(--app-text3);text-align:center;padding:12px 16px 8px;border-bottom:1px solid var(--app-border);margin-bottom:4px}
.settings-menu-btn{display:flex;align-items:center;gap:14px;width:100%;background:none;border:none;
  padding:16px 24px;font-size:var(--fs-base);color:var(--app-text);font-family:inherit;cursor:pointer;text-align:left;min-height:56px}
.settings-menu-btn:active{background:var(--app-hover)}
.settings-menu-btn i{font-size:20px;flex-shrink:0;color:var(--app-text2)}
.settings-menu-cancel{display:flex;align-items:center;justify-content:center;width:100%;background:none;border:none;
  padding:16px 24px;font-size:var(--fs-base);color:var(--app-text2);font-family:inherit;cursor:pointer;min-height:56px;
  border-top:1px solid var(--app-border);margin-top:4px}
.settings-menu-cancel:active{background:var(--app-hover)}

/* colour picker */
.cpgrid{display:grid;grid-template-columns:repeat(10,1fr);gap:7px;margin-bottom:12px}
.cp-cell{width:100%;aspect-ratio:1;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:transform .12s,border-color .12s;position:relative}
.cp-cell:active{transform:scale(1.15)}
.cp-cell.selected{border-color:var(--app-text)}
.cp-cell.selected::after{content:'';position:absolute;inset:3px;border-radius:50%;border:1.5px solid rgba(255,255,255,.8)}
.cp-custom{display:flex;align-items:center;gap:10px;margin-top:8px}
.cp-custom input[type=color]{width:40px;height:36px;border:1px solid var(--app-border2);border-radius:6px;cursor:pointer;padding:2px;background:var(--app-surface)}
.cp-custom input[type=text]{flex:1;padding:10px 12px;border:1px solid var(--app-border2);border-radius:var(--br);font-size:var(--fs-base);font-family:inherit;background:var(--app-surface);color:var(--app-text);outline:none}
.cp-preview{width:32px;height:32px;border-radius:50%;border:1px solid var(--app-border2);flex-shrink:0}
.theme-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.theme-card{cursor:pointer;border-radius:10px;overflow:hidden;border:2px solid var(--app-border);transition:border-color .15s}
.theme-card.selected{border-color:var(--app-accent)}
.theme-preview{width:100%;height:52px;display:grid;grid-template-columns:28% 72%}
.tp-side{height:100%}
.tp-main{padding:6px 5px;display:flex;flex-direction:column;gap:3px}
.tp-line{height:2.5px;border-radius:2px}
.theme-name{font-size:11px;text-align:center;padding:5px 3px;background:var(--app-hover);color:var(--app-text2);font-weight:500}
.section-divider{border:none;border-top:1px solid var(--app-border);margin:16px 0}
.proj-row-list{display:flex;flex-direction:column;gap:14px}
.proj-row-item{display:flex;flex-direction:column;gap:8px}
.proj-row-header{display:flex;align-items:center;gap:8px;font-size:var(--fs-sm);font-weight:500;color:var(--app-text)}
.row-swatch-strip{display:grid;grid-template-columns:repeat(6,1fr);gap:7px}
.rcs{height:28px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:border-color .12s;position:relative}
.rcs.selected{border-color:var(--app-accent)}
.rcs.selected::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;color:rgba(0,0,0,.4)}

/* ── mobile overlay ── */
@media(max-width:599px){
  :root{--sidebar-w:0px}
  .app{grid-template-columns:1fr}
  .sidebar{position:fixed;left:0;top:0;bottom:0;width:270px;transform:translateX(-100%);
    transition:transform .25s ease;z-index:50;box-shadow:4px 0 24px rgba(0,0,0,.15)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:49}
  .sidebar-overlay.show{display:block}
  /* ①② top-bar 顯示：漢堡 + tabs，無標題 */
  .top-bar{display:flex!important;align-items:center;
    border-bottom:1px solid var(--app-border);background:var(--app-sidebar);
    flex-shrink:0;padding:0}
  /* 手機版隱藏舊的 mobile-header 與獨立 main-tabs */
  .mobile-header{display:none!important}
  .main-tabs{display:none!important}
  .main{height:100dvh}
}
@media(min-width:600px){
  .top-bar{display:none!important}
  .mobile-header{display:none}
  .sidebar-overlay{display:none!important}
}

.save-dot{position:fixed;bottom:18px;right:18px;width:9px;height:9px;border-radius:50%;background:#5a9e6f;opacity:0;transition:opacity .4s;z-index:300}
.save-dot.show{opacity:1}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--app-text);color:var(--app-bg);font-size:var(--fs-sm);padding:10px 20px;border-radius:24px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:400;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<div class="save-dot" id="saveDot"></div>
<div class="toast" id="toast"></div>
<div id="actionSheetContainer"></div>
<div id="settingsMenuContainer"></div>

<div class="app" id="app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span>Life Project</span>
      <button class="btn-add-project" onclick="openNewProject()"><i class="ti ti-plus"></i></button>
    </div>
    <div class="projects-list" id="projectsList"></div>
    <div class="sidebar-footer">
      <!-- ② single 設定 button -->
      <button class="btn-settings-main" onclick="openSettingsMenu()"><i class="ti ti-settings"></i>設定</button>
    </div>
  </div>

  <div class="main">
    <!-- ①② top-bar（手機）：漢堡 + tabs，無標題 -->
    <div class="top-bar" id="topBar">
      <button class="btn-menu" onclick="openSidebar()"><i class="ti ti-menu-2"></i></button>
      <button class="tab active" id="top-tab-calendar" onclick="switchTab('calendar',this,'top')">行事曆</button>
      <button class="tab" id="top-tab-tasks" onclick="switchTab('tasks',this,'top')">任務</button>
    </div>
    <!-- 桌面版 tabs（手機隱藏） -->
    <div class="main-tabs">
      <button class="tab active" id="tab-calendar" onclick="switchTab('calendar',this,'desk')">行事曆</button>
      <button class="tab" id="tab-tasks" onclick="switchTab('tasks',this,'desk')">任務</button>
    </div>
    <div class="main-content">
      <div class="task-pane active" id="pane-calendar" style="padding:14px 14px 10px">
        <div id="calContent" style="display:flex;flex-direction:column;flex:1;overflow:hidden"></div>
      </div>
      <div class="task-pane" id="pane-tasks">
        <div id="taskContent" style="display:flex;flex-direction:column;flex:1"></div>
      </div>
      </div>
    </div>
  </div>
</div>
<div class="tasks-bottom-bar" id="tasksBottomBar">
  <button class="btn-toggle-done-float" id="btnToggleDone" onclick="toggleShowDone('tasks')">隱藏已完成</button>
  <button class="btn-fab-add" id="btnFabAdd" onclick="fabAddTask()"><i class="ti ti-plus"></i></button>
</div>
<div id="modalContainer"></div>

<script>
const THEMES={
  '晨霧白':{bg:'#fafaf8',sidebar:'#f4f2ee',border:'#e5e2db',border2:'#ccc8bf',text:'#1c1917',text2:'#78716c',text3:'#b8b2aa',surface:'#fafaf8',hover:'#edeae4',accent:'#1c1917'},
  '燕麥奶':{bg:'#fdf8f0',sidebar:'#f5ede0',border:'#e8daca',border2:'#d4c4ae',text:'#2c1f0e',text2:'#8a6d4e',text3:'#bda98c',surface:'#fdf8f0',hover:'#ede3d4',accent:'#7c4f2a'},
  '薄荷霧':{bg:'#f4faf6',sidebar:'#e8f5ed',border:'#cde8d6',border2:'#aed5bc',text:'#0e2418',text2:'#4a7a5a',text3:'#93bea2',surface:'#f4faf6',hover:'#ddf0e4',accent:'#2d6e48'},
  '石板藍':{bg:'#f2f5f9',sidebar:'#e5ebf3',border:'#ccd5e3',border2:'#adbace',text:'#0f1c2e',text2:'#4a607e',text3:'#8fa5be',surface:'#f2f5f9',hover:'#dce4ef',accent:'#1e4080'},
  '玫瑰灰':{bg:'#faf4f4',sidebar:'#f2e8e8',border:'#e4d0d0',border2:'#ccb4b4',text:'#1e0e0e',text2:'#7a4a4a',text3:'#b89090',surface:'#faf4f4',hover:'#eddada',accent:'#7a2828'},
  '夜墨':{bg:'#16161a',sidebar:'#111116',border:'#2a2a32',border2:'#3c3c48',text:'#ebebf0',text2:'#8888a0',text3:'#48485a',surface:'#1c1c22',hover:'#242430',accent:'#a0a0c8'},
  '深海':{bg:'#0d1520',sidebar:'#091018',border:'#162236',border2:'#1f3350',text:'#d8e8f8',text2:'#6888a8',text3:'#304858',surface:'#101b2a',hover:'#152030',accent:'#5090d0'},
  '森炭':{bg:'#111810',sidebar:'#0c1209',border:'#1e2e1a',border2:'#2c4226',text:'#d8ead2',text2:'#5e845a',text3:'#304430',surface:'#141e12',hover:'#1a2818',accent:'#68b05a'},
};
const ROW_COLORS=[
  {hex:'#e8f0fb',name:'晴空藍'},{hex:'#eef4fd',name:'霧藍灰'},
  {hex:'#eaf5ee',name:'薄荷綠'},{hex:'#edf2f0',name:'煙灰綠'},
  {hex:'#fef6e4',name:'奶油黃'},{hex:'#fdeef3',name:'蜜桃粉'},
  {hex:'#f0ecfb',name:'薰衣草'},{hex:'#f8eef8',name:'淡丁香'},
  {hex:'#e8f6f6',name:'霧霾青'},{hex:'#fdf0e8',name:'杏桃橙'},
  {hex:'#f4f0ec',name:'燕麥米'},{hex:'#f5f5f0',name:'暖石灰'},
];
const DEFAULT_ROW='#e8f0fb';
const PALETTE=['#E8534A','#F97316','#F59E0B','#EAB308','#84CC16','#22C55E','#10B981','#14B8A6','#06B6D4','#0EA5E9','#3B82F6','#6366F1','#8B5CF6','#A855F7','#D946EF','#EC4899','#F43F5E','#64748B','#6B7280','#374151','#1c1917','#92400E','#166534','#1E3A5F','#4C1D95','#831843','#0369A1','#7C3AED','#B45309','#065F46'];
const LS_KEY='lifeproject_v2';

let uid=1;const nid=()=>'n'+(uid++);
let state={projects:[],activeProject:null,calYear:new Date().getFullYear(),calMonth:new Date().getMonth(),calFilter:{}};
let appearance={theme:'晨霧白'};
let showDone={tasks:true,tree:true};

/* ── localStorage ── */
function saveToLS(){
  try{localStorage.setItem(LS_KEY,JSON.stringify({state,appearance,uid,showDone}));flashSave();}catch(e){}
}
function loadFromLS(){
  try{
    const raw=localStorage.getItem(LS_KEY);if(!raw)return false;
    const {state:s,appearance:a,uid:u,showDone:sd}=JSON.parse(raw);
    if(s)Object.assign(state,s);if(a)Object.assign(appearance,a);if(u)uid=u;if(sd)Object.assign(showDone,sd);
    return true;
  }catch(e){return false}
}
let sdTimer=null;
function flashSave(){const el=document.getElementById('saveDot');el.classList.add('show');clearTimeout(sdTimer);sdTimer=setTimeout(()=>el.classList.remove('show'),1200)}
function saveAndRender(){saveToLS();renderAll()}

/* ── export/import ── */
function exportData(){
  const blob=new Blob([JSON.stringify({version:2,exportedAt:new Date().toISOString(),state,appearance,uid,showDone},null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=url;a.download=`LifeProject_${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(url);
  showToast('資料已匯出');
}
function importData(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(d.state)Object.assign(state,d.state);if(d.appearance)Object.assign(appearance,d.appearance);
      if(d.uid)uid=d.uid;if(d.showDone)Object.assign(showDone,d.showDone);
      saveToLS();applyAppearance();renderAll();showToast('資料匯入成功 ✓');
    }catch{showToast('匯入失敗，請確認檔案格式')}
  };reader.readAsText(file);e.target.value='';
}

/* ── settings menu (action sheet) ── */
function openSettingsMenu(){
  document.getElementById('settingsMenuContainer').innerHTML=`
    <div class="settings-menu-backdrop" onclick="closeSettingsMenu()">
      <div class="settings-menu" onclick="event.stopPropagation()">
        <div class="settings-menu-title">設定</div>
        <button class="settings-menu-btn" onclick="closeSettingsMenu();openSettings()"><i class="ti ti-palette"></i>外觀設定</button>
        <button class="settings-menu-btn" onclick="closeSettingsMenu();exportData()"><i class="ti ti-download"></i>匯出資料 (JSON)</button>
        <label class="settings-menu-btn" style="cursor:pointer"><i class="ti ti-upload"></i>匯入資料 (JSON)<input type="file" accept=".json" style="display:none" onchange="closeSettingsMenu();importData(event)"></label>
        <button class="settings-menu-cancel" onclick="closeSettingsMenu()">取消</button>
      </div>
    </div>`;
}
function closeSettingsMenu(){document.getElementById('settingsMenuContainer').innerHTML=''}

/* ── appearance ── */
function applyAppearance(){
  const t=THEMES[appearance.theme]||THEMES['晨霧白'],r=document.documentElement;
  ['bg','sidebar','border','border2','text','text2','text3','surface','hover','accent'].forEach(k=>r.style.setProperty('--app-'+k,t[k]));
  r.style.setProperty('--task-fs','16px');
  document.querySelector('meta[name="theme-color"]').setAttribute('content',t.sidebar);
}

/* ── data helpers ── */
function sortByDate(a){a.sort((x,y)=>{if(!x.date&&!y.date)return 0;if(!x.date)return 1;if(!y.date)return -1;return x.date<y.date?-1:x.date>y.date?1:0})}
function findParentList(nodeId){for(const p of state.projects){if(p.tasks.find(t=>t.id===nodeId))return p.tasks;const r=fPLin(nodeId,p.tasks);if(r)return r}return null}
function fPLin(nodeId,nodes){for(const n of nodes){if(n.children.find(c=>c.id===nodeId))return n.children;const r=fPLin(nodeId,n.children);if(r)return r}return null}
function getProj(id){return state.projects.find(p=>p.id===id)}
function findNode(id,nodes){for(const n of nodes){if(n.id===id)return n;const f=findNode(id,n.children);if(f)return f}return null}
function findNodeInAll(id){for(const p of state.projects){const n=findNode(id,p.tasks);if(n)return n}return null}
function collectAll(nodes,proj,arr){nodes.forEach(n=>{arr.push({node:n,proj});if(n.children)collectAll(n.children,proj,arr)})}
function getNodePath(nodeId,proj){function s(ns,path){for(const n of ns){const p=[...path,n.name];if(n.id===nodeId)return p;const r=s(n.children,p);if(r)return r}return null}return s(proj.tasks,[])}
function activeTab(){
  const a=document.querySelector('#tab-calendar.active,#tab-tasks.active,#top-tab-calendar.active,#top-tab-tasks.active');
  if(!a)return'calendar';
  return a.id.replace('top-tab-','').replace('tab-','');
}

/* ── mobile sidebar ── */
function openSidebar(){document.getElementById('sidebar').classList.add('open');document.getElementById('sidebarOverlay').classList.add('show')}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebarOverlay').classList.remove('show')}

/* ── touch-drag sort for project list ── */function openProjectActionSheet(id){
  const p=getProj(id);if(!p)return;
  document.getElementById('actionSheetContainer').innerHTML=`
    <div class="action-sheet-backdrop" onclick="closeActionSheet()">
      <div class="action-sheet" onclick="event.stopPropagation()">
        <div class="action-sheet-title">${esc(p.name)}</div>
        <button class="action-sheet-btn" onclick="closeActionSheet();openEditProject('${id}')">
          <i class="ti ti-pencil"></i>編輯專案
        </button>
        <button class="action-sheet-btn danger" onclick="closeActionSheet();deleteProj('${id}')">
          <i class="ti ti-trash"></i>刪除專案
        </button>
        <button class="action-sheet-cancel" onclick="closeActionSheet()">取消</button>
      </div>
    </div>`;
}
function closeActionSheet(){document.getElementById('actionSheetContainer').innerHTML=''}

/* ── touch-drag sort for project list ── */
let td={active:false,id:null,ghost:null,startY:0,lastY:0,overEl:null,holdTimer:null};
const HOLD_MS=500; // hold duration before drag starts

function projTouchStart(e,id){
  if(e.touches.length!==1)return;
  const t=e.touches[0];
  td.startY=t.clientY;td.lastY=t.clientY;td.id=id;td.active=false;
  td.holdTimer=setTimeout(()=>{
    td.active=true;
    navigator.vibrate&&navigator.vibrate(40);
    _createGhost(id,t.clientX,t.clientY);
    const el=document.getElementById('proj-'+id);
    if(el)el.classList.add('dragging');
  },HOLD_MS);
}

function projTouchMove(e){
  const t=e.touches[0];
  const dy=Math.abs(t.clientY-td.startY);
  // cancel hold if finger moved more than 6px before threshold
  if(!td.active && dy>6){clearTimeout(td.holdTimer);td.holdTimer=null;return;}
  if(!td.active)return;
  e.preventDefault(); // prevent scroll while dragging
  td.lastY=t.clientY;
  // move ghost
  if(td.ghost){
    td.ghost.style.top=(t.clientY-28)+'px';
    td.ghost.style.left='14px';
  }
  // find element under finger
  const els=document.getElementById('projectsList').querySelectorAll('.project-item');
  let over=null;
  els.forEach(el=>{
    const r=el.getBoundingClientRect();
    if(t.clientY>=r.top && t.clientY<=r.bottom) over=el;
  });
  if(td.overEl && td.overEl!==over) td.overEl.classList.remove('drag-over');
  if(over && over.id!=='proj-'+td.id){over.classList.add('drag-over');td.overEl=over;}
  else if(!over) td.overEl=null;
}

function projTouchEnd(e){
  clearTimeout(td.holdTimer);td.holdTimer=null;
  if(!td.active){td.id=null;return;}
  // drop
  _removeGhost();
  document.querySelectorAll('.project-item').forEach(el=>{el.classList.remove('dragging');el.classList.remove('drag-over')});
  if(td.overEl){
    const toId=td.overEl.id.replace('proj-','');
    const from=state.projects.findIndex(p=>p.id===td.id);
    const to=state.projects.findIndex(p=>p.id===toId);

/* Build the full org-chart HTML for one project */
function buildOrgChart(proj){
  const tasks=showDone.tree?proj.tasks:proj.tasks.filter(t=>!t.done);
  if(!tasks.length)return`<div class="empty-state" style="padding:40px 20px"><i class="ti ti-sitemap"></i>尚無任務</div>`;

  // Root node (project name)
  const childrenHtml=tasks.map(t=>ocChildCol(t,proj,proj.color)).join('');
  const hLine=tasks.length>1?`<div style="position:relative;width:100%">${ocHBar(tasks.length)}</div>`:'';

  return `<div class="oc-node" style="width:100%">
    <div class="oc-box root" style="border-color:${proj.color};color:${proj.color}">${esc(proj.name)}</div>
    ${tasks.length?`
      <div class="oc-connector-down"></div>
      ${hLine}
      <div class="oc-children-row">${childrenHtml}</div>
    `:''}
  </div>`;
}

/* One column (child node + its subtree) */
function ocChildCol(node,proj,color){
  if(!showDone.tree&&node.done)return'';
  const kids=showDone.tree?node.children:node.children.filter(c=>!c.done);
  const isLeaf=kids.length===0;

  // If all children are leaves, render them as list under this node
  const allKidsLeaf=kids.every(k=>k.children.length===0||(showDone.tree?false:k.children.filter(c=>!c.done).length===0));

  let subtree='';
  if(kids.length>0){
    if(allKidsLeaf){
      // render as leaf list
      const items=kids.map(k=>{
        if(!showDone.tree&&k.done)return'';
        return `<div class="oc-leaf-item" onclick="toggleDone('${k.id}','${proj.id}');renderTree()">
          <div class="oc-leaf-cb${k.done?' checked':''}">${k.done?'<i class="ti ti-check" style="font-size:7px"></i>':''}</div>
          <span class="oc-leaf-label${k.done?' done':''}">${esc(k.name)}</span>
        </div>`;
      }).join('');
      subtree=`<div class="oc-connector-down"></div><div class="oc-leaf-list">${items}</div>`;
    } else {
      const childCols=kids.map(k=>ocChildCol(k,proj,color)).join('');
      const hLine=kids.length>1?`<div style="position:relative;width:100%">${ocHBar(kids.length)}</div>`:'';
      subtree=`<div class="oc-connector-down"></div>${hLine}<div class="oc-children-row">${childCols}</div>`;
    }
  }

  return `<div class="oc-child-col">
    <div class="oc-node">
      <div class="oc-box${node.done?' done':''}" style="border-color:${color}88"
        onclick="openEditTask('${node.id}','${proj.id}')">${esc(node.name)}</div>
      ${subtree}
    </div>
  </div>`;
}

/* Draw the horizontal bar connecting siblings */
function ocHBar(count){
  if(count<=1)return'';
  // We use a CSS trick: a full-width line that spans siblings
  // Each child col has padding:0 12px, so total width is dynamic
  // We draw a ::before line via inline SVG after render via JS
  // For now return a simple flex spacer; actual line drawn in initTreeLines()
  return `<div class="oc-hbar-placeholder" data-count="${count}"></div>`;
}

/* After render: draw SVG connector lines */
function initTreeLines(){
  const canvas=document.getElementById('treeCanvas');if(!canvas)return;
  // Remove old SVG overlays
  canvas.querySelectorAll('.oc-svg-lines').forEach(e=>e.remove());
  // For each children-row, draw an H-bar connecting first and last child centres
  canvas.querySelectorAll('.oc-children-row').forEach(row=>{
    const cols=Array.from(row.querySelectorAll(':scope > .oc-child-col'));
    if(cols.length<2)return;
    const rowRect=row.getBoundingClientRect();
    const canvasRect=canvas.getBoundingClientRect();
    const firstBox=cols[0].querySelector('.oc-box');
    const lastBox=cols[cols.length-1].querySelector('.oc-box');
    if(!firstBox||!lastBox)return;
    const fr=firstBox.getBoundingClientRect();
    const lr=lastBox.getBoundingClientRect();
    const x1=fr.left+fr.width/2-canvasRect.left;
    const x2=lr.left+lr.width/2-canvasRect.left;
    const y=fr.top-canvasRect.top-4; // just above the boxes
    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.classList.add('oc-svg-lines');
    svg.style.cssText=`position:absolute;top:0;left:0;width:${canvas.scrollWidth}px;height:${canvas.scrollHeight}px;pointer-events:none;overflow:visible`;
    const line=document.createElementNS('http://www.w3.org/2000/svg','line');
    const color=getComputedStyle(document.documentElement).getPropertyValue('--app-border2').trim()||'#ccc';
    line.setAttribute('x1',x1);line.setAttribute('y1',y);
    line.setAttribute('x2',x2);line.setAttribute('y2',y);
    line.setAttribute('stroke',color);line.setAttribute('stroke-width','2');
    svg.appendChild(line);
    canvas.appendChild(svg);
  });
}

/* Pinch-to-zoom */
function initTreePinchZoom(){
  const wrap=document.getElementById('treeCanvasWrap');
  const canvas=document.getElementById('treeCanvas');
  if(!wrap||!canvas)return;
  let scale=1,lastDist=0;
  wrap.addEventListener('touchstart',e=>{
    if(e.touches.length===2){lastDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}
  },{passive:true});
  wrap.addEventListener('touchmove',e=>{
    if(e.touches.length===2){
      const dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      if(lastDist>0){scale=Math.min(2,Math.max(0.4,scale*(dist/lastDist)));}
      lastDist=dist;
      canvas.style.transform=`scale(${scale})`;
      canvas.style.transformOrigin='top left';
      e.preventDefault();
    }
  },{passive:false});
  wrap.addEventListener('touchend',()=>{lastDist=0;},{passive:true});
  // draw lines after paint
  requestAnimationFrame(()=>requestAnimationFrame(initTreeLines));
}

/* ── 自製日期選擇器 ──
   用法：在表單中放 <div id="dp-FIELDID"></div>，呼叫 dpRender('FIELDID', initDate)
   dpGet('FIELDID') 取得選取值 'YYYY-MM-DD' 或 ''
*/
const _dp={};

function dpRender(fid,initVal){
  const today=new Date();
  let sel=null;
  if(initVal){const p=initVal.split('-');if(p.length===3)sel={y:+p[0],m:+p[1]-1,d:+p[2]};}
  _dp[fid]={fid,year:sel?sel.y:today.getFullYear(),month:sel?sel.m:today.getMonth(),selected:sel};
  _dpDraw(fid);
}
function _dpDraw(fid){
  const s=_dp[fid];if(!s)return;
  const el=document.getElementById('dp-'+fid);if(!el)return;
  const today=new Date();
  const firstDay=new Date(s.year,s.month,1);
  const lastDay=new Date(s.year,s.month+1,0);
  const startDow=firstDay.getDay();
  const months=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const total=Math.ceil((startDow+lastDay.getDate())/7)*7;
  let cells='';
  for(let i=0;i<total;i++){
    const d=i-startDow+1;
    const inM=d>=1&&d<=lastDay.getDate();
    const isToday=inM&&today.getFullYear()===s.year&&today.getMonth()===s.month&&today.getDate()===d;
    const isSel=s.selected&&inM&&s.selected.y===s.year&&s.selected.m===s.month&&s.selected.d===d;
    const cls=['dp-cell',!inM?'other':'',isToday?'today':'',isSel?'selected':''].filter(Boolean).join(' ');
    const onclick=inM?`onclick="dpPick('${fid}',${s.year},${s.month},${d})"`:''
    cells+=`<div class="${cls}" ${onclick}>${inM?d:''}</div>`;
  }
  const selLabel=s.selected?`${s.selected.y} 年 ${s.selected.m+1} 月 ${s.selected.d} 日`:'尚未選取日期';
  el.innerHTML=`<div class="dp-wrap">
    <div class="dp-header">
      <button class="dp-nav" onclick="dpPrev('${fid}')"><i class="ti ti-chevron-left"></i></button>
      <span class="dp-month-label">${s.year} 年 ${months[s.month]}</span>
      <button class="dp-nav" onclick="dpNext('${fid}')"><i class="ti ti-chevron-right"></i></button>
    </div>
    <div class="dp-grid">
      ${['日','一','二','三','四','五','六'].map(w=>`<div class="dp-dow">${w}</div>`).join('')}
      ${cells}
    </div>
    <div class="dp-selected-label">${selLabel}</div>
  </div>`;
}
function dpPrev(fid){const s=_dp[fid];if(!s)return;s.month--;if(s.month<0){s.month=11;s.year--;}; _dpDraw(fid);}
function dpNext(fid){const s=_dp[fid];if(!s)return;s.month++;if(s.month>11){s.month=0;s.year++;};_dpDraw(fid);}
function dpPick(fid,y,m,d){const s=_dp[fid];if(!s)return;s.selected={y,m,d};_dpDraw(fid);}
function dpClear(fid){const s=_dp[fid];if(!s)return;s.selected=null;_dpDraw(fid);}
function dpGet(fid){
  const s=_dp[fid];
  if(!s||!s.selected)return'';
  const {y,m,d}=s.selected;
  return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

  openEditTask(nodeId,projId);
}

/* 在彈出視窗內勾選任務 — 全域狀態同步，不關閉視窗 */
function dayModalToggleDone(nodeId,projId,ds){
  const p=getProj(projId);if(!p)return;
  const node=findNode(nodeId,p.tasks);if(!node)return;
  node.done=!node.done;
  saveToLS();
  // 局部更新 checkbox 外觀
  const row=document.getElementById('dmrow-'+nodeId);
  if(row){
    const cb=row.querySelector('div[onclick]');
    if(cb){
      cb.style.background=node.done?'#5a9e6f':'none';
      cb.style.borderColor=node.done?'#5a9e6f':'var(--app-border2)';
      cb.innerHTML=(node.done?'<i class="ti ti-check" style="font-size:10px"></i>':'')
        +'<span style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:44px;height:44px;display:block"></span>';
    }
    const nameEl=row.querySelector('div[style*="task-fs"]');
    if(nameEl){
      nameEl.style.color=node.done?'var(--app-text3)':'var(--app-text)';
      nameEl.style.textDecoration=node.done?'line-through':'none';
    }
  }
  // 背景行事曆靜默更新
  renderCalendar();
}
function changeMonth(d){state.calMonth+=d;if(state.calMonth<0){state.calMonth=11;state.calYear--}if(state.calMonth>11){state.calMonth=0;state.calYear++}saveToLS();renderCalendar()}
function switchTab(id,btn,src){
  ['tab-calendar','tab-tasks'].forEach(tid=>{
    const d=document.getElementById(tid);
    const t=document.getElementById('top-'+tid);
    if(d)d.classList.remove('active');
    if(t)t.classList.remove('active');
  });
  document.querySelectorAll('.task-pane').forEach(p=>p.classList.remove('active'));
  const d=document.getElementById('tab-'+id);
  const t=document.getElementById('top-tab-'+id);
  if(d)d.classList.add('active');
  if(t)t.classList.add('active');
  document.getElementById('pane-'+id).classList.add('active');
  // 底部懸浮列：只在任務分頁顯示
  const bar=document.getElementById('tasksBottomBar');
  if(bar)bar.classList.toggle('visible',id==='tasks');
  renderMain();
}
function deleteProj(id){
  if(!confirm('確定刪除此專案？'))return;
  state.projects=state.projects.filter(p=>p.id!==id);delete state.calFilter[id];
  if(state.activeProject===id)state.activeProject=state.projects[0]?.id||null;saveAndRender()
}
function toggleDone(nodeId,projId){const p=getProj(projId);if(!p)return;const n=findNode(nodeId,p.tasks);if(n)n.done=!n.done;saveAndRender()}
function toggleExpand(nodeId,projId){const p=getProj(projId);if(!p)return;const n=findNode(nodeId,p.tasks);if(n)n.expanded=!n.expanded;saveAndRender()}
function deleteNode(nodeId,projId){const p=getProj(projId);if(!p)return;p.tasks=p.tasks.filter(t=>t.id!==nodeId);function rem(ns){ns.forEach(n=>{n.children=n.children.filter(c=>c.id!==nodeId);rem(n.children)})}rem(p.tasks);saveAndRender()}

/* ── selectProj ── */

/* cal drag */
let calDragId=null;
function calDO(e,ds){if(!calDragId)return;e.preventDefault();document.querySelectorAll('.cal-day.drop-target').forEach(el=>el.classList.remove('drop-target'));e.currentTarget.classList.add('drop-target')}
function calDL(e){if(!e.currentTarget.contains(e.relatedTarget))e.currentTarget.classList.remove('drop-target')}
function calDrop(e,ds){e.preventDefault();document.querySelectorAll('.cal-day.drop-target').forEach(el=>el.classList.remove('drop-target'));if(!calDragId)return;const node=findNodeInAll(calDragId);if(!node||node.date===ds){calDragId=null;return}node.date=ds;const siblings=findParentList(calDragId);if(siblings)sortByDate(siblings);calDragId=null;saveToLS();renderCalendar();showToast(`已移至 ${ds}`)}

/* colour picker */
let pickedColor='#3B82F6';
function cpHTML(cur){pickedColor=cur||'#3B82F6';return`<div class="cpgrid">${PALETTE.map(c=>`<div class="cp-cell${c===pickedColor?' selected':''}" style="background:${c}" onclick="pickC('${c}')"></div>`).join('')}</div><div class="cp-custom"><input type="color" id="cpN" value="${pickedColor}" oninput="pickC(this.value)"/><input type="text" id="cpH" value="${pickedColor}" placeholder="#rrggbb" oninput="pickCH(this.value)" maxlength="7"/><div class="cp-preview" id="cpPrev" style="background:${pickedColor}"></div></div>`}
function pickC(c){pickedColor=c;document.querySelectorAll('.cp-cell').forEach(el=>el.classList.toggle('selected',el.style.background===c||el.style.background===hRgb(c)));const h=document.getElementById('cpH');if(h)h.value=c;const n=document.getElementById('cpN');if(n)n.value=c;const pv=document.getElementById('cpPrev');if(pv)pv.style.background=c}
function pickCH(v){if(/^#[0-9a-fA-F]{6}$/.test(v))pickC(v)}
function hRgb(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgb(${r}, ${g}, ${b})`}

/* modals */
function openNewProject(){
  pickedColor=PALETTE[state.projects.length%PALETTE.length];
  showModal(`<h3>新增專案</h3><div class="form-group"><label>專案名稱</label><input type="text" id="pName" placeholder="例：學習計畫" autocomplete="off"/></div><div class="form-group"><label>代表色</label>${cpHTML(pickedColor)}</div><div class="modal-actions"><button class="btn-secondary" onclick="closeModal()">取消</button><button class="btn-primary" onclick="submitNewProject()">建立</button></div>`);
  setTimeout(()=>document.getElementById('pName')?.focus(),50);
}
function submitNewProject(){
  const name=document.getElementById('pName')?.value.trim();if(!name)return;
  const p={id:nid(),name,color:pickedColor,rowColor:DEFAULT_ROW,tasks:[]};
  state.projects.push(p);state.activeProject=p.id;state.calFilter[p.id]=true;
  closeModal();saveAndRender();
}
function openEditProject(id){
  const p=getProj(id);if(!p)return;pickedColor=p.color;
  showModal(`<h3>編輯專案</h3><div class="form-group"><label>專案名稱</label><input type="text" id="ePName" value="${esc(p.name)}" autocomplete="off"/></div><div class="form-group"><label>代表色</label>${cpHTML(p.color)}</div><div class="modal-actions"><button class="btn-secondary" onclick="closeModal()">取消</button><button class="btn-primary" onclick="submitEditProject('${id}')">儲存</button></div>`);
  setTimeout(()=>document.getElementById('ePName')?.focus(),50);
}
function submitEditProject(id){const p=getProj(id);if(!p)return;const name=document.getElementById('ePName')?.value.trim();if(!name)return;p.name=name;p.color=pickedColor;closeModal();saveAndRender()}
function openAddTask(projId,parentId){
  const p=getProj(projId);if(!p)return;
  const par=parentId?findNode(parentId,p.tasks):null;
  const title=par?`新增子任務（${esc(par.name)}）`:'新增任務';
  const subtitle=par?`${esc(p.name)} › ${esc(par.name)}`:esc(p.name);
  showModal(`<h3>${title}</h3>
    <div class="note-path">${subtitle}</div>
    <div class="form-group"><label>任務名稱</label>
      <input type="text" id="tName" placeholder="任務名稱" autocomplete="off"/>
    </div>
    <div class="form-group"><label>目標日期</label>
      <div id="dp-tDate"></div>
      <button type="button" class="dp-clear" onclick="dpClear('tDate')">✕ 不顯示日期</button>
    </div>
    <div class="form-group"><label>備註（選填）</label>
      <textarea id="tNote" rows="4" placeholder="備註..."></textarea>
    </div>
    <div class="modal-actions" style="justify-content:flex-end">
      <button class="btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn-primary" onclick="submitNewTask('${projId}','${parentId||''}')">新增</button>
    </div>`);
  setTimeout(()=>{dpRender('tDate','');document.getElementById('tName')?.focus();},50);
}
function submitNewTask(projId,parentId){
  const name=document.getElementById('tName')?.value.trim();if(!name)return;
  const date=dpGet('tDate'),note=document.getElementById('tNote')?.value||'';
  const p=getProj(projId);if(!p)return;
  const node={id:nid(),name,date,note,done:false,children:[],expanded:true};
  if(parentId){const par=findNode(parentId,p.tasks);if(par){par.children.push(node);sortByDate(par.children);par.expanded=true}}
  else{p.tasks.push(node);sortByDate(p.tasks)}
  closeModal();saveAndRender();
}
/* ② ③ ④ 整合編輯視窗：名稱改「編輯」，含備註、日期、刪除 */
function openEditTask(nodeId,projId){
  const p=getProj(projId);if(!p)return;
  const node=findNode(nodeId,p.tasks);if(!node)return;
  const path=getNodePath(nodeId,p)||[];
  showModal(`<h3>編輯</h3>
    <div class="note-path">${esc(p.name)} › ${esc(path.join(' › '))}</div>
    <div class="form-group"><label>任務名稱</label>
      <input type="text" id="etName" value="${esc(node.name)}" autocomplete="off"/>
    </div>
    <div class="form-group"><label>目標日期</label>
      <div id="dp-etDate"></div>
      <button type="button" class="dp-clear" onclick="dpClear('etDate')">✕ 不顯示日期</button>
    </div>
    <div class="form-group"><label>備註</label>
      <textarea id="etNote" rows="4" placeholder="輸入備註...">${esc(node.note||'')}</textarea>
    </div>
    <div class="modal-actions" style="justify-content:space-between">
      <button class="btn-danger" onclick="confirmDeleteNode('${nodeId}','${projId}')"><i class="ti ti-trash" style="margin-right:4px"></i>刪除</button>
      <div style="display:flex;gap:8px">
        <button class="btn-secondary" onclick="closeModal()">取消</button>
        <button class="btn-primary" onclick="submitEditTask('${nodeId}','${projId}')">儲存</button>
      </div>
    </div>`);
  setTimeout(()=>{dpRender('etDate',node.date||'');document.getElementById('etName')?.focus();},50);
}
function submitEditTask(nodeId,projId){
  const p=getProj(projId);if(!p)return;
  const node=findNode(nodeId,p.tasks);if(!node)return;
  const name=document.getElementById('etName')?.value.trim();if(!name)return;
  node.name=name;
  node.date=dpGet('etDate');
  node.note=document.getElementById('etNote')?.value||'';
  const siblings=findParentList(nodeId);if(siblings)sortByDate(siblings);
  closeModal();
  saveToLS();
  renderCalendar();
  if(activeTab()==='tasks')renderTasks();
  // 若單日視窗開著，重新開啟同一天
  if(_dayModalDs)openDayModal(_dayModalDs);
}
function confirmDeleteNode(nodeId,projId){
  closeModal();
  deleteNode(nodeId,projId);
}

function openSettings(){
  const themeCards=Object.entries(THEMES).map(([name,t])=>`<div class="theme-card${appearance.theme===name?' selected':''}" onclick="setTheme('${name}')"><div class="theme-preview"><div class="tp-side" style="background:${t.sidebar}"></div><div class="tp-main" style="background:${t.bg}"><div class="tp-line" style="background:${t.accent};width:55%"></div><div class="tp-line" style="background:${t.text2};width:75%"></div><div class="tp-line" style="background:${t.text3};width:45%"></div></div></div><div class="theme-name">${name}</div></div>`).join('');

  if(!state.projects.length){
    showModal(`<h3>外觀設定</h3>
      <div class="form-group"><label>版面主題</label><div class="theme-grid">${themeCards}</div></div>
      <div class="modal-actions"><button class="btn-secondary" onclick="resetApp()">還原預設</button><button class="btn-primary" onclick="closeModal()">完成</button></div>`);
    return;
  }

  // 下拉選單
  const opts=state.projects.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('');
  // 預設選第一個專案的色盤
  const firstProj=state.projects[0];
  const swatches=_prcSwatches(firstProj.id);

  showModal(`<h3>外觀設定</h3>
    <div class="form-group"><label>版面主題</label><div class="theme-grid">${themeCards}</div></div>
    <hr class="section-divider"/>
    <div class="form-group">
      <label>任務列背景色</label>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <select id="prcProjSel" onchange="prcSelect(this.value)"
          style="flex:1;padding:10px 12px;border:1px solid var(--app-border2);border-radius:var(--br);
            font-size:var(--fs-sm);font-family:inherit;background:var(--app-surface);color:var(--app-text);
            outline:none;-webkit-appearance:none;appearance:none;">
          ${opts}
        </select>
        <span id="prcPreview" style="width:32px;height:32px;border-radius:6px;flex-shrink:0;
          background:${firstProj.rowColor||DEFAULT_ROW};border:1px solid var(--app-border)"></span>
      </div>
      <div class="row-swatch-strip" id="prcStrip" style="display:grid;grid-template-columns:repeat(6,1fr);gap:7px">${swatches}</div>
    </div>
    <div class="modal-actions"><button class="btn-secondary" onclick="resetApp()">還原預設</button><button class="btn-primary" onclick="closeModal()">完成</button></div>`);
}

/* 產生單一色盤 HTML */
function _prcSwatches(projId){
  const p=getProj(projId);
  return ROW_COLORS.map(c=>`<div class="rcs${p&&p.rowColor===c.hex?' selected':''}" style="background:${c.hex}" onclick="prcPick('${c.hex}')" title="${c.name}"></div>`).join('');
}

/* 下拉切換專案 → 更新色盤與預覽 */
function prcSelect(projId){
  const strip=document.getElementById('prcStrip');
  const prev=document.getElementById('prcPreview');
  if(strip) strip.innerHTML=_prcSwatches(projId);
  const p=getProj(projId);
  if(prev&&p) prev.style.background=p.rowColor||DEFAULT_ROW;
}

/* 點選色塊 → 更新資料 + 預覽 + 色盤勾選 */
function prcPick(hex){
  const sel=document.getElementById('prcProjSel');
  if(!sel)return;
  const projId=sel.value;
  const p=getProj(projId);
  if(!p)return;
  p.rowColor=hex;
  saveToLS();
  // 更新預覽
  const prev=document.getElementById('prcPreview');
  if(prev) prev.style.background=hex;
  // 更新色盤勾選
  const strip=document.getElementById('prcStrip');
  if(strip) strip.querySelectorAll('.rcs').forEach(el=>{
    el.classList.toggle('selected', el.style.background===hex||el.style.backgroundColor===hex);
  });
  // 若目前任務分頁顯示的正是這個專案，即時重繪
  if(state.activeProject===projId) renderTasks();
}

/* 舊 setPRC 保留相容性 */
function setPRC(projId,hex){prcPick(hex);}

function resetApp(){appearance={theme:'晨霧白'};state.projects.forEach(p=>p.rowColor=DEFAULT_ROW);applyAppearance();saveToLS();closeModal();openSettings()}
function setTheme(name){appearance.theme=name;applyAppearance();saveToLS();document.querySelectorAll('.theme-card').forEach(el=>el.classList.toggle('selected',el.getAttribute('onclick')===`setTheme('${name}')`));renderSidebar()}

function showModal(html){
  // 將 modal-actions 從捲動區抽出，固定在底部
  const actMatch=html.match(/<div class="modal-actions"[^>]*>([\s\S]*?)<\/div>\s*$/);
  let scrollHtml=html, actionsHtml='';
  if(actMatch){
    actionsHtml=actMatch[0];
    scrollHtml=html.slice(0,html.lastIndexOf(actMatch[0]));
  }
  document.getElementById('modalContainer').innerHTML=`
    <div class="modal-backdrop" onclick="closeModal()">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-scroll">${scrollHtml}</div>
        ${actionsHtml}
      </div>
    </div>`;
}
function closeModal(){document.getElementById('modalContainer').innerHTML=''}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
let toastTimer=null;
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),2400)}

/* ── init ── */
const loaded=loadFromLS();
if(!loaded){
  const p1={id:nid(),name:'我的第一個專案',color:'#3B82F6',rowColor:'#e8f0fb',tasks:[]};
  state.projects.push(p1);state.activeProject=p1.id;state.calFilter[p1.id]=true;
}
applyAppearance();renderSidebar();renderCalendar();
</script>
